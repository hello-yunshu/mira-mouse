  <text x="330" y="65" text-anchor="middle" font-family="-apple-system, 'PingFang SC', system-ui, sans-serif" font-size="9" font-weight="400" fill="#9B91A8" letter-spacing="0.5">鼠标配置工具 · Mouse Configuration</text>

  <g opacity="0.3">
    <line x1="230" y1="200" x2="420" y2="200" stroke="#D8B0B7" stroke-width="1.5" stroke-dasharray="6,5"/>
