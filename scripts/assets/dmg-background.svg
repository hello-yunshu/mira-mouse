      <stop offset="0%" stop-color="#1E1A28"/>
      <stop offset="50%" stop-color="#241F30"/>
      <stop offset="100%" stop-color="#2D2638"/>
    </linearGradient>
    <radialGradient id="auraPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D8B0B7" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#D8B0B7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D8B0B7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B7BB0" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#9B7BB0" stop-opacity="0.07"/>
