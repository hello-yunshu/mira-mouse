  <text x="330" y="350" text-anchor="middle" font-family="-apple-system, 'PingFang SC', system-ui, sans-serif" font-size="12" font-weight="600" fill="#C8C2D4">将 Mira 拖到 Applications 文件夹完成安装</text>
  <text x="330" y="366" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9" font-weight="400" fill="#7E7588">Drag Mira to the Applications folder to install</text>
