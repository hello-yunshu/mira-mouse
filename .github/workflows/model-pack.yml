name: Local AI Packs

on:
  workflow_call:
    inputs:
      pack-version:
        description: 'Optional assertion; must equal both checked-in model and handler versions'
        required: false
        type: string
      rill-version:
        description: 'Optional verified Rill release snapshot; defaults to latest stable'
        required: false
        type: string
    outputs:
      model-version:
        description: 'Signed model version'
        value: ${{ jobs.build-local-ai-packs.outputs.model-version }}
      handler-version:
        description: 'Signed handler version'
        value: ${{ jobs.build-local-ai-packs.outputs.handler-version }}
    secrets:
      RILL_V2_SIGNING_KEY:
        description: 'Ed25519 seed for the Rill v2 model pack and release index'
        required: true
      HANDLER_SIGNING_KEY:
        description: 'Independent Ed25519 seed for Mira handler packs'
        required: true
  workflow_dispatch:
    inputs:
      pack-version:
        description: 'Optional assertion matching checked-in model and handler versions'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: local-ai-packs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-local-ai-packs:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      model-version: ${{ steps.meta.outputs.model-version }}
      handler-version: ${{ steps.meta.outputs.handler-version }}
      model-sha256: ${{ steps.sha.outputs.model-sha256 }}
      handler-sha256: ${{ steps.sha.outputs.handler-sha256 }}
    steps:
      - uses: actions/checkout@v7
      - name: Resolve latest signed Rill stable release
        id: rill
        env:
          RILL_VERSION: ${{ inputs.rill-version }}
        run: |
          if [ -n "$RILL_VERSION" ]; then
            node scripts/resolve-latest-rill-release.mjs --version "$RILL_VERSION"
          else
            node scripts/resolve-latest-rill-release.mjs
          fi
      - name: Checkout resolved Rill source (for rill-pack tool)
        uses: actions/checkout@v7
        with:
          repository: hello-yunshu/rill-ml
          ref: ${{ steps.rill.outputs.tag }}
          path: RillML

      - name: Install Rust and WASM tooling
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add --toolchain stable wasm32-unknown-unknown
          cargo install wasm-tools --locked

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/wasm-tools
            target
            handlers/mira-battery-handler/target
          key: cargo-local-ai-packs-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-local-ai-packs-${{ runner.os }}-
            cargo-rust-${{ runner.os }}-

      - name: Resolve independent model and handler versions
        id: meta
        env:
          ASSERTED_VERSION: ${{ inputs.pack-version }}
        shell: bash
        run: |
          set -euo pipefail
          model_version=$(node -p "require('./local-ai/model-manifest.json').version")
          handler_manifest_version=$(node -p "require('./handlers/mira-battery-handler/manifest.template.json').version")
          handler_cargo_version=$(sed -n 's/^version = "\([^"]*\)"$/\1/p' handlers/mira-battery-handler/Cargo.toml | head -n1)
          test -n "$model_version"
          test -n "$handler_manifest_version"
          test "$handler_manifest_version" = "$handler_cargo_version"
          if [ -n "$ASSERTED_VERSION" ]; then
            test "$ASSERTED_VERSION" = "$model_version"
            test "$ASSERTED_VERSION" = "$handler_manifest_version"
          fi
          echo "model-version=$model_version" >> "$GITHUB_OUTPUT"
          echo "handler-version=$handler_manifest_version" >> "$GITHUB_OUTPUT"

      - name: Build signed model pack
        env:
          RILL_SIGNING_KEY_HEX: ${{ secrets.RILL_V2_SIGNING_KEY }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          node scripts/build-model-manifest.mjs \
            local-ai/model-manifest.json "${{ steps.meta.outputs.model-version }}" \
            artifacts/model-manifest.json
          cargo run --release --manifest-path RillML/crates/rill-runtime/Cargo.toml \
            --bin rill-pack -- create \
            --manifest artifacts/model-manifest.json \
            --model local-ai/model.json \
            --output artifacts/model.rillpack

      - name: Build WASM handler component
        env:
          MIRA_HANDLER_VERSION: ${{ steps.meta.outputs.handler-version }}
        run: |
          set -euo pipefail
          cargo build --locked --release \
            --manifest-path handlers/mira-battery-handler/Cargo.toml \
            --target wasm32-unknown-unknown
          wasm-tools component new \
            handlers/mira-battery-handler/target/wasm32-unknown-unknown/release/mira-battery-handler.wasm \
            -o artifacts/mira-battery-handler.component.wasm
          node scripts/build-handler-manifest.mjs \
            handlers/mira-battery-handler/manifest.template.json \
            artifacts/mira-battery-handler.component.wasm \
            "${{ steps.meta.outputs.handler-version }}" \
            artifacts/handler-manifest.json

      - name: Sign handler pack with its independent key
        env:
          RILL_SIGNING_KEY_HEX: ${{ secrets.HANDLER_SIGNING_KEY }}
        run: |
          cargo run --release --manifest-path RillML/crates/rill-runtime/Cargo.toml \
            --bin rill-pack -- create-handler \
            --manifest artifacts/handler-manifest.json \
            --module artifacts/mira-battery-handler.component.wasm \
            --output artifacts/handler.rillhandler

      - name: Verify both signed packs
        run: |
          set -euo pipefail
          cargo run --release --manifest-path RillML/crates/rill-runtime/Cargo.toml \
            --bin rill-pack -- verify \
            --pack artifacts/model.rillpack \
            --key-id mira-rill-2026-002 \
            --public-key-hex ae4633988fd9e02a824bb9072f1dcf470a0b1d74bbc7905aaea00a62139e1479
          cargo run --release --manifest-path RillML/crates/rill-runtime/Cargo.toml \
            --bin rill-pack -- inspect-handler \
            --handler artifacts/handler.rillhandler \
            --key-id mira-handler-2026-001 \
            --public-key-hex cefbe96db58196e4b3a8455f427ca75efaedacb68792ae82d7d06dd8c86f193e

      - name: Compute SHA-256
        id: sha
        run: |
          model_sha=$(sha256sum artifacts/model.rillpack | awk '{print $1}')
          handler_sha=$(sha256sum artifacts/handler.rillhandler | awk '{print $1}')
          echo "model-sha256=$model_sha" >> "$GITHUB_OUTPUT"
          echo "handler-sha256=$handler_sha" >> "$GITHUB_OUTPUT"

      - name: Upload model and handler packs
        uses: actions/upload-artifact@v7
        with:
          name: local-ai-packs
          path: |
            artifacts/model.rillpack
            artifacts/handler.rillhandler
          if-no-files-found: error
          retention-days: 30

      - name: Job summary
        run: |
          {
            echo "## Local AI Pack Summary"
            echo ""
            echo "- Model version: ${{ steps.meta.outputs.model-version }}"
            echo "- Handler version: ${{ steps.meta.outputs.handler-version }}"
            echo "- Model SHA-256: ${{ steps.sha.outputs.model-sha256 }}"
            echo "- Handler SHA-256: ${{ steps.sha.outputs.handler-sha256 }}"
            echo "- Rill release: ${{ steps.rill.outputs.version }}"
            echo "- Rill handler ABI: 1"
            echo "- Rill runtime IPC: 2"
          } >> "$GITHUB_STEP_SUMMARY"
