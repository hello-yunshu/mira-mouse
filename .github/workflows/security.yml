name: Security
on:
  push: { branches: [main], paths: ['Cargo.lock', 'package-lock.json', 'deny.toml', '.github/workflows/**', 'crates/**', 'src/**'] }
  pull_request: { paths: ['Cargo.lock', 'package-lock.json', 'deny.toml', '.github/workflows/**', 'crates/**', 'src/**'] }
  schedule: [{ cron: '17 3 * * 1' }]
permissions: { contents: read, security-events: write }
concurrency: { group: 'security-${{ github.ref }}', cancel-in-progress: true }
jobs:
  codeql:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3 peeled commit
        with: { languages: 'javascript-typescript,actions' }
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3 peeled commit
  rust-and-workflows:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: cargo install cargo-audit --locked
      - run: cargo audit
      - run: node scripts/check-boundaries.mjs

