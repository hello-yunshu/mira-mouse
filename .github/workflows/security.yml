name: Security
on:
  push: { branches: [main], paths: ['Cargo.lock', 'package-lock.json', 'deny.toml', '.github/workflows/**', 'crates/**', 'src/**'] }
  pull_request: { paths: ['Cargo.lock', 'package-lock.json', 'deny.toml', '.github/workflows/**', 'crates/**', 'src/**'] }
  schedule: [{ cron: '17 3 * * 1' }]
permissions: { contents: read, security-events: write }
concurrency: { group: 'security-${{ github.ref }}', cancel-in-progress: true }
jobs:
  codeql:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3 peeled commit
        with: { languages: 'javascript-typescript,actions' }
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3 peeled commit
  rust-and-workflows:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: cargo install cargo-audit --locked
      - run: cargo audit
      - run: node scripts/check-boundaries.mjs

