name: Security
on:
  push: { branches: [main], paths: ['Cargo.lock', 'package-lock.json', 'deny.toml', '.github/workflows/**', 'crates/**', 'src/**'] }
  pull_request: { paths: ['Cargo.lock', 'package-lock.json', 'deny.toml', '.github/workflows/**', 'crates/**', 'src/**'] }
  schedule: [{ cron: '17 3 * * 1' }]
permissions: { contents: read, security-events: write }
concurrency: { group: 'security-${{ github.ref }}', cancel-in-progress: true }
jobs:
  codeql:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with: { languages: 'javascript-typescript,actions' }
      - uses: github/codeql-action/analyze@v4
  rust-and-workflows:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
        # quick-xml 0.37.x/0.39.x pinned by upstream (plist via tauri, tauri-winrt-notification via notify-rust)
        # see audit.toml for details; remove once upstream releases quick-xml 0.41+ compatible versions
      - run: node scripts/check-boundaries.mjs
