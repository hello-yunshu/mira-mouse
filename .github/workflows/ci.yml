name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  frontend:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm test && npm run build
      - run: npm run check:boundaries && npm run check:structured
  rust:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install host libraries
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libudev-dev  
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: cargo build --workspace --release --locked
  configuration:
    strategy: { fail-fast: false, matrix: { os: [macos-14, windows-2022, ubuntu-22.04] } }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Parse release configuration
        shell: bash
        run: |
          set -euo pipefail
          node -e "JSON.parse(require('fs').readFileSync('plugins.lock.json'));JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json'))"
      - name: Evidence summary
        shell: bash
        run: echo 'Configuration parsed; platform package and hardware status are not implied.' >> "$GITHUB_STEP_SUMMARY"

  tauri-bundle:
    needs: [frontend, rust, configuration]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: |
              target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage
              target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
              target/x86_64-unknown-linux-gnu/release/bundle/**/*.rpm
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Install host libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libudev-dev
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy --target ${{ matrix.target }}
      - run: cargo run --package xtask -- plugins sync --locked --offline
      - run: npx tauri build --target ${{ matrix.target }}
      - name: Upload bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mira-bundle-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
      - name: Job summary
        shell: bash
        run: echo 'Tauri bundle produced for ${{ matrix.target }}; unsigned community artifact.' >> "$GITHUB_STEP_SUMMARY"

