name: CI / Release
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      overwrite_latest:
        description: 'Overwrite latest release (rebuild without version bump)'
        required: false
        default: 'true'
        type: boolean
      tag:
        description: 'Release tag (required when overwrite_latest is false, e.g. app/v0.1.0)'
        required: false
        type: string
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref || inputs.tag || 'dispatch' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  frontend:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm test && npm run build
      - run: npm run check:boundaries && npm run check:structured
  rust:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Install host libraries
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libudev-dev  
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-rust-${{ runner.os }}-
      - run: cargo fmt --all --check
      - run: cargo run --package xtask -- plugins sync --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
  configuration:
    if: github.event_name != 'workflow_dispatch'
    strategy: { fail-fast: false, matrix: { os: [macos-14, windows-2022, ubuntu-22.04] } }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Parse release configuration
        shell: bash
        run: |
          set -euo pipefail
          node -e "JSON.parse(require('fs').readFileSync('plugins.lock.json'));JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json'))"
      - name: Evidence summary
        shell: bash
        run: echo 'Configuration parsed; platform package and hardware status are not implied.' >> "$GITHUB_STEP_SUMMARY"

  plugin-lock:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - run: rustup toolchain install stable --profile minimal
      - name: Verify plugin lock against published release assets
        run: cargo run --package xtask -- plugins check-lock

  tauri-bundle:
    needs: [frontend, rust, configuration, plugin-lock]
    if: ${{ !cancelled() && needs.frontend.result != 'failure' && needs.rust.result != 'failure' && needs.configuration.result != 'failure' && needs.plugin-lock.result != 'failure' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-2022
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Install host libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libudev-dev
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy --target ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-bundle-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-bundle-${{ runner.os }}-${{ matrix.target }}-
            cargo-bundle-${{ runner.os }}-
            cargo-rust-${{ runner.os }}-
      - run: cargo run --package xtask -- plugins sync --locked
      - name: Clean stale bundle outputs
        # 清掉 cargo cache 里残留的旧版本 bundle 产物，避免旧版本文件被 upload-artifact 的 glob 命中后混入新 release
        shell: bash
        run: find target -type d -name bundle -exec rm -rf {} + 2>/dev/null || true
      - name: Build Tauri bundle
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ github.event_name != 'pull_request' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo "PR build: unsigned, single-target"
            npx tauri build --target ${{ matrix.target }}
          else
            echo "Release build: signed, updater artifacts"
            case "$RUNNER_OS" in
              macOS)
                rustup target add aarch64-apple-darwin x86_64-apple-darwin
                # Tauri 内置 --bundles dmg 会先构建 .app（DMG 的依赖），
                # 再打包 DMG（使用 tauri.conf.json > bundle.macOS.dmg 的背景/布局配置），
                # 同时基于 .app 生成 updater artifacts（.app.tar.gz + .sig）。
                npm exec tauri build -- --target universal-apple-darwin --bundles dmg --config '{"bundle":{"createUpdaterArtifacts":true}}'
                ;;
              Windows)
                npm exec tauri build -- --bundles nsis --config '{"bundle":{"createUpdaterArtifacts":true}}'
                ;;
              Linux)
                npm exec tauri build -- --bundles appimage --config '{"bundle":{"createUpdaterArtifacts":true}}'
                ;;
            esac
          fi
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: mira-bundle-${{ matrix.os }}
          path: |
            target/**/bundle/**/*_universal.dmg
            target/**/bundle/**/*_aarch64.dmg
            target/**/bundle/**/*.app.tar.gz
            target/**/bundle/**/*.app.tar.gz.sig
            target/**/bundle/**/*-setup.exe
            target/**/bundle/**/*-setup.exe.sig
            target/**/bundle/**/*.AppImage
            target/**/bundle/**/*.AppImage.sig
          if-no-files-found: error
      - name: Job summary
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo 'Tauri bundle produced for ${{ matrix.target }}; unsigned community artifact.' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Signed Tauri bundle with updater artifacts produced for ${{ runner.os }}.' >> "$GITHUB_STEP_SUMMARY"
          fi

  release-publish:
    needs: [tauri-bundle]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions: { contents: write, id-token: write, attestations: write }
    environment: release
    concurrency:
      group: app-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: mira-bundle-*
          merge-multiple: true
      - name: Verify release-ready and determine tag
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          OVERWRITE: ${{ inputs.overwrite_latest == true }}
        run: |
          set -euo pipefail
          node -e "const l=require('./plugins.lock.json');if(!l.releaseReady)throw Error('plugins.lock.json is not release-ready')"
          current_version=$(node scripts/app-version.mjs)
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$OVERWRITE" = "true" ]; then
              tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
              test -n "$tag" || { echo "No existing release to overwrite"; exit 1; }
              version="${tag#app/v}"
            else
              tag="$INPUT_TAG"
              version="${tag#app/v}"
              test "$version" = "$current_version"
            fi
          else
            latest_tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
            if [ -z "$latest_tag" ]; then
              tag="app/v$current_version"
              version="$current_version"
              echo "No previous release; creating $tag"
            else
              latest_version="${latest_tag#app/v}"
              if [ "$current_version" != "$latest_version" ]; then
                tag="app/v$current_version"
                version="$current_version"
                echo "Version changed: $latest_version -> $current_version"
              else
                tag="$latest_tag"
                version="$current_version"
                echo "Version unchanged ($current_version); overwriting $latest_tag"
              fi
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Generate latest.json for Tauri Updater
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          REPO="hello-yunshu/mira-mouse"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir publish-assets
          find release-assets -type f \( \
            -name '*_universal.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' -o \
            -name '*-setup.exe' -o -name '*-setup.exe.sig' -o \
            -name '*.AppImage' -o -name '*.AppImage.sig' \
          \) -exec cp {} publish-assets/ \;
          (
            cd publish-assets
            # macOS: DMG 自带版本号（Mira_<v>_universal.dmg），仅替换前缀；
            # .app.tar.gz / .sig 默认不带版本号，需手动注入 $VERSION 以保持命名一致性
            for f in *.dmg *.app.tar.gz *.app.tar.gz.sig; do
              [ -f "$f" ] || continue
              case "$f" in
                *.app.tar.gz.sig) mv "$f" "Mira_macOS_${VERSION}.app.tar.gz.sig" ;;
                *.app.tar.gz)     mv "$f" "Mira_macOS_${VERSION}.app.tar.gz" ;;
                *)                mv "$f" "Mira_macOS${f#Mira}" ;;
              esac
            done
            for f in *-setup.exe *-setup.exe.sig; do
              [ -f "$f" ] || continue
              mv "$f" "Mira_Windows${f#Mira}"
            done
            for f in *.AppImage *.AppImage.sig; do
              [ -f "$f" ] || continue
              mv "$f" "Mira_Linux${f#Mira}"
            done
          )
          echo "=== publish-assets contents ==="
          ls -la publish-assets/
          MAC_FILE=$(find publish-assets -name 'Mira_macOS*.app.tar.gz' -print -quit)
          WIN_FILE=$(find publish-assets -name 'Mira_Windows*-setup.exe' -print -quit)
          LINUX_FILE=$(find publish-assets -name 'Mira_Linux*.AppImage' -print -quit)
          for f in "$MAC_FILE" "$WIN_FILE" "$LINUX_FILE"; do
            if [ -z "$f" ] || [ ! -f "$f" ] || [ ! -f "$f.sig" ]; then
              echo "Missing updater artifact or signature: ${f:-<empty>}" >&2
              exit 1
            fi
          done
          MAC_SIG=$(cat "$MAC_FILE.sig")
          WIN_SIG=$(cat "$WIN_FILE.sig")
          LINUX_SIG=$(cat "$LINUX_FILE.sig")
          MAC_URL="$BASE/$(basename "$MAC_FILE")"
          WIN_URL="$BASE/$(basename "$WIN_FILE")"
          LINUX_URL="$BASE/$(basename "$LINUX_FILE")"
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "Mira $VERSION. See release notes for details.",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": { "signature": "$MAC_SIG", "url": "$MAC_URL" },
              "darwin-x86_64": { "signature": "$MAC_SIG", "url": "$MAC_URL" },
              "linux-x86_64": { "signature": "$LINUX_SIG", "url": "$LINUX_URL" },
              "windows-x86_64": { "signature": "$WIN_SIG", "url": "$WIN_URL" }
            }
          }
          EOF
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'publish-assets/*'
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          TARGET: ${{ github.sha }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Mira $VERSION

          ## 下载说明

          - **macOS**: 下载 \`Mira_macOS_*.dmg\` 安装包
          - **Windows**: 下载 \`Mira_Windows_*-setup.exe\` 安装包
          - **Linux**: 下载 \`Mira_Linux_*.AppImage\` 安装包

          ## 自动更新

          带 \`.sig\` 和 \`.app.tar.gz\` 的文件是 Tauri 自动更新用的签名产物，普通用户无需下载。
          \`latest.json\` 是自动更新元数据文件。
          EOF
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists; uploading assets."
            gh release upload "$TAG" publish-assets/* latest.json --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md --title "Mira $VERSION"
          else
            gh release create "$TAG" publish-assets/* latest.json \
              --target "$TARGET" \
              --title "Mira $VERSION" \
              --notes-file release-notes.md
          fi

  homebrew-tap:
    needs: [release-publish]
    if: ${{ !cancelled() && needs.release-publish.result == 'success' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Detect HOMEBREW_TAP_TOKEN
        id: token
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN is not configured; tap sync will be skipped." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Resolve latest release tag and version
        if: steps.token.outputs.has_token == 'true'
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName')
          version="${tag#app/v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Download DMG and compute SHA-256
        if: steps.token.outputs.has_token == 'true'
        id: dmg
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "Mira_macOS_${VERSION}_universal.dmg" --dir artifacts
          dmg="artifacts/Mira_macOS_${VERSION}_universal.dmg"
          test -f "$dmg"
          sha=$(sha256sum "$dmg" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "Computed SHA-256 for ${VERSION}: ${sha}" >> "$GITHUB_STEP_SUMMARY"
      - name: Render and push Cask to tap repository
        if: steps.token.outputs.has_token == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256: ${{ steps.dmg.outputs.sha256 }}
        run: |
          set -euo pipefail
          mkdir -p Casks
          sed -e "s/__VERSION__/${VERSION}/g" \
              -e "s/__SHA256__/${SHA256}/g" \
              homebrew/Casks/mira.rb > Casks/mira.rb
          echo "=== Rendered Casks/mira.rb ==="
          cat Casks/mira.rb
          rm -rf tap
          git clone "https://x-access-token:${GH_TOKEN}@github.com/hello-yunshu/homebrew-mira.git" tap
          mkdir -p tap/Casks
          cp Casks/mira.rb tap/Casks/mira.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/mira.rb
          if git diff --cached --quiet; then
            echo "No changes; tap already at mira ${VERSION}."
            echo "Tap already at mira ${VERSION}; no push needed." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "Bump mira to ${VERSION}"
            git push
            echo "Pushed mira ${VERSION} to hello-yunshu/homebrew-mira." >> "$GITHUB_STEP_SUMMARY"
          fi
