name: Release
on:
  push:
    tags: ['app/v*']
permissions:
  contents: read
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  gate:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs: { version: '${{ steps.meta.outputs.version }}' }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: meta
        env: { RELEASE_TAG: '${{ github.ref_name }}' }
        run: |
          set -euo pipefail
          node -e "const l=require('./plugins.lock.json');if(!l.releaseReady)throw Error('plugins.lock.json is not release-ready')"
          version="${RELEASE_TAG#app/v}"
          test "$version" = "$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
  build:
    needs: gate
    strategy: { fail-fast: false, matrix: { os: [macos-14, windows-2022, ubuntu-22.04] } }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: rustup toolchain install stable --profile minimal
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Build signed updater packages
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: '${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            macOS) rustup target add aarch64-apple-darwin x86_64-apple-darwin; npm exec tauri build -- --target universal-apple-darwin ;;
            Windows) npm exec tauri build -- --bundles nsis ;;
            Linux) npm exec tauri build -- --bundles appimage,deb,rpm ;;
          esac
          find target -type f -path '*/bundle/*' -print0 | xargs -0 shasum -a 256 > SHA256SUMS.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ runner.os }}
          path: |
            target/**/bundle/**
            SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error
  attest-and-draft:
    needs: [gate, build]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions: { contents: write, id-token: write, attestations: write }
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { path: release-assets, pattern: release-*, merge-multiple: true }
      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3 peeled commit
        with: { subject-path: 'release-assets/**/*' }
      - name: Generate latest.json for Tauri Updater
        shell: bash
        env:
          VERSION: '${{ needs.gate.outputs.version }}'
          TAG: '${{ github.ref_name }}'
        run: |
          set -euo pipefail
          REPO="hello-yunshu/mira-mouse"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # 收集各平台的 .tar.gz/.sig 和 .nsis/.sig 签名文件
          MAC_SIG=$(find release-assets -name '*.app.tar.gz.sig' | head -1 | xargs cat 2>/dev/null || echo "")
          WIN_SIG=$(find release-assets -name '*-setup.exe.sig' | head -1 | xargs cat 2>/dev/null || echo "")
          LINUX_SIG=$(find release-assets -name '*.AppImage.tar.gz.sig' | head -1 | xargs cat 2>/dev/null || echo "")
          MAC_URL="$BASE/Mira_${VERSION}_universal.app.tar.gz"
          WIN_URL="$BASE/Mira_${VERSION}_x64-setup.exe"
          LINUX_URL="$BASE/Mira_${VERSION}_x86_64.AppImage.tar.gz"
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "Mira $VERSION. See release notes for details.",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": { "signature": "$MAC_SIG", "url": "$MAC_URL" },
              "darwin-x86_64": { "signature": "$MAC_SIG", "url": "$MAC_URL" },
              "linux-x86_64": { "signature": "$LINUX_SIG", "url": "$LINUX_URL" },
              "windows-x86_64": { "signature": "$WIN_SIG", "url": "$WIN_URL" }
            }
          }
          EOF
      - env: { GH_TOKEN: '${{ github.token }}', TAG: '${{ github.ref_name }}' }
        run: |
          gh release create "$TAG" release-assets/**/* latest.json \
            --draft --verify-tag \
            --title "Mira ${TAG#app/v}" \
            --notes "Community release with Tauri Updater signing. Platform code-signing and notarization remain separate evidence states."
