name: Release
on:
  workflow_dispatch:
    inputs:
      overwrite_latest:
        description: 'Overwrite latest release (rebuild without version bump)'
        required: false
        default: 'true'
        type: boolean
      tag:
        description: 'Release tag (required when overwrite_latest is false, e.g. app/v0.1.0)'
        required: false
        type: string
permissions:
  contents: read
concurrency:
  group: release-${{ inputs.tag || 'overwrite' }}
  cancel-in-progress: false
jobs:
  gate:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      version: '${{ steps.meta.outputs.version }}'
      tag: '${{ steps.meta.outputs.tag }}'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: meta
        env:
          INPUT_TAG: '${{ inputs.tag }}'
          OVERWRITE: "${{ inputs.overwrite_latest == true }}"
          GH_TOKEN: '${{ github.token }}'
        run: |
          set -euo pipefail
          node -e "const l=require('./plugins.lock.json');if(!l.releaseReady)throw Error('plugins.lock.json is not release-ready')"
          if [ "$OVERWRITE" = "true" ]; then
            tag=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
            test -n "$tag" || { echo "No existing release to overwrite"; exit 1; }
            version="${tag#app/v}"
          else
            tag="$INPUT_TAG"
            version="${tag#app/v}"
            test "$version" = "$(node -p "require('./package.json').version")"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
  build:
    needs: gate
    strategy: { fail-fast: false, matrix: { os: [macos-14, windows-2022, ubuntu-22.04] } }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: rustup toolchain install stable --profile minimal
      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libudev-dev
      - name: Sync locked default plugins
        run: cargo run --package xtask -- plugins sync --locked
      - name: Build signed updater packages
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: '${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            macOS) rustup target add aarch64-apple-darwin x86_64-apple-darwin; npm exec tauri build -- --target universal-apple-darwin --config '{"bundle":{"createUpdaterArtifacts":true}}' ;;
            Windows) npm exec tauri build -- --bundles nsis --config '{"bundle":{"createUpdaterArtifacts":true}}' ;;
            Linux) npm exec tauri build -- --bundles appimage,deb,rpm --config '{"bundle":{"createUpdaterArtifacts":true}}' ;;
          esac
          find target -type f -path '*/bundle/*' -print0 | xargs -0 shasum -a 256 > SHA256SUMS.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ runner.os }}
          path: |
            target/**/bundle/**
            SHA256SUMS.txt
          retention-days: 7
          if-no-files-found: error
  attest-and-publish:
    needs: [gate, build]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions: { contents: write, id-token: write, attestations: write }
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { path: release-assets, pattern: release-*, merge-multiple: true }
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v3 peeled commit
        with: { subject-path: 'release-assets/**/*' }
      - name: Generate latest.json for Tauri Updater
        shell: bash
        env:
          VERSION: '${{ needs.gate.outputs.version }}'
          TAG: '${{ needs.gate.outputs.tag }}'
        run: |
          set -euo pipefail
          REPO="hello-yunshu/mira-mouse"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir publish-assets
          find release-assets -type f \( \
            -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' -o \
            -name '*.deb' -o -name '*.rpm' -o -name '*.app.tar.gz' -o \
            -name '*.AppImage.tar.gz' -o -name '*.nsis.zip' -o -name '*.sig' \
          \) -exec cp {} publish-assets/ \;
          MAC_FILE=$(find publish-assets -name '*.app.tar.gz' -print -quit)
          WIN_FILE=$(find publish-assets -name '*.nsis.zip' -print -quit)
          LINUX_FILE=$(find publish-assets -name '*.AppImage.tar.gz' -print -quit)
          test -f "$MAC_FILE" && test -f "$MAC_FILE.sig"
          test -f "$WIN_FILE" && test -f "$WIN_FILE.sig"
          test -f "$LINUX_FILE" && test -f "$LINUX_FILE.sig"
          MAC_SIG=$(cat "$MAC_FILE.sig")
          WIN_SIG=$(cat "$WIN_FILE.sig")
          LINUX_SIG=$(cat "$LINUX_FILE.sig")
          MAC_URL="$BASE/$(basename "$MAC_FILE")"
          WIN_URL="$BASE/$(basename "$WIN_FILE")"
          LINUX_URL="$BASE/$(basename "$LINUX_FILE")"
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "Mira $VERSION. See release notes for details.",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "darwin-aarch64": { "signature": "$MAC_SIG", "url": "$MAC_URL" },
              "darwin-x86_64": { "signature": "$MAC_SIG", "url": "$MAC_URL" },
              "linux-x86_64": { "signature": "$LINUX_SIG", "url": "$LINUX_URL" },
              "windows-x86_64": { "signature": "$WIN_SIG", "url": "$WIN_URL" }
            }
          }
          EOF
      - env:
          GH_TOKEN: '${{ github.token }}'
          TAG: '${{ needs.gate.outputs.tag }}'
          VERSION: '${{ needs.gate.outputs.version }}'
          TARGET: '${{ github.sha }}'
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists; uploading assets."
            gh release upload "$TAG" publish-assets/* latest.json --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" publish-assets/* latest.json \
              --target "$TARGET" \
              --title "Mira $VERSION" \
              --notes "Official Mira release with Tauri Updater signing. Platform notarization and OS code-signing evidence are tracked separately."
          fi
