name: Preview Packages
on:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true
jobs:
  unsigned-preview:
    strategy: { fail-fast: false, matrix: { os: [macos-14, windows-2022, ubuntu-22.04] } }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: rustup toolchain install stable --profile minimal
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-preview-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-preview-${{ runner.os }}-
      - name: Install Linux libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libudev-dev
      - name: Sync locked default plugins
        run: cargo run --package xtask -- plugins sync --locked
      - name: Download the platform Rill sidecar
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            macOS) target=aarch64-apple-darwin ;;
            Windows) target=x86_64-pc-windows-msvc ;;
            Linux) target=x86_64-unknown-linux-gnu ;;
          esac
          cargo run --package xtask -- dist-sidecar --target "$target"
      - name: Build unsigned preview
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            macOS) rustup target add aarch64-apple-darwin; npm exec tauri build -- --target aarch64-apple-darwin ;;
            Windows) npm exec tauri build -- --bundles nsis ;;
            Linux) npm exec tauri build -- --bundles appimage,deb,rpm ;;
          esac
      - uses: actions/upload-artifact@v7
        with:
          name: unsigned-preview-${{ runner.os }}
          path: target/**/bundle/**
          retention-days: 7
          if-no-files-found: error
