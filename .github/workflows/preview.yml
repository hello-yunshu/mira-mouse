name: Preview Packages
on:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true
jobs:
  unsigned-preview:
    strategy: { fail-fast: false, matrix: { os: [macos-14, windows-2022, ubuntu-22.04] } }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: rustup toolchain install stable --profile minimal
      - name: Install Linux libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Build unsigned preview
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            macOS) rustup target add aarch64-apple-darwin x86_64-apple-darwin; npm exec tauri build -- --target universal-apple-darwin ;;
            Windows) npm exec tauri build -- --bundles nsis ;;
            Linux) npm exec tauri build -- --bundles appimage,deb,rpm ;;
          esac
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-preview-${{ runner.os }}
          path: target/**/bundle/**
          retention-days: 7
          if-no-files-found: error
