# cargo-audit configuration
# https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
# quick-xml advisory ignores (pending upstream update)
# - RUSTSEC-2026-0194: quadratic runtime when checking duplicate attribute names
# - RUSTSEC-2026-0195: unbounded namespace-declaration allocation DoS in NsReader
# Both quick-xml versions are pinned by upstream constraints:
#   - 0.39.x required by plist 1.9.0 (^0.39.2) via tauri 2.11.x
#   - 0.37.x required by tauri-winrt-notification 0.7.2 (^0.37) via notify-rust 4.18
# Cannot upgrade to fixed 0.41.0 until plist and tauri-winrt-notification release
# new versions. Re-evaluate periodically.
ignore = [
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
